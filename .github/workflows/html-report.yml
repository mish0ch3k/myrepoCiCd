name: HTML Report

on: [push]

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest --html=report.html --self-contained-html
      - uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.html